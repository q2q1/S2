<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h2 class="card-title text-center mb-4">Create Account</h2>

          <app-alert *ngIf="errorMessage" [message]="errorMessage" (dismissed)="errorMessage = null"></app-alert>
          <app-alert *ngIf="successMessage" [message]="successMessage" type="success" (dismissed)="successMessage = null"></app-alert>

          <!-- Suggested username alert for 409 conflicts -->
          <div *ngIf="suggestedUsername" class="alert alert-warning">
            Username taken. Suggested: <strong>{{ suggestedUsername }}</strong>
          </div>

          <form (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label for="name" class="form-label">Full Name <span class="text-danger">*</span></label>
              <input type="text" id="name" class="form-control" [(ngModel)]="name" name="name" required placeholder="Jane Doe" />
            </div>

            <div class="mb-3">
              <label for="username" class="form-label">Username <span class="text-danger">*</span></label>
              <input type="text" id="username" class="form-control" [(ngModel)]="username" name="username" required placeholder="janedoe" />
            </div>

            <div class="mb-3">
              <label for="email" class="form-label">Email address <span class="text-danger">*</span></label>
              <input type="email" id="email" class="form-control" [(ngModel)]="email" name="email" required placeholder="jane@example.com" />
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Password <span class="text-danger">*</span></label>
              <input type="password" id="password" class="form-control" [(ngModel)]="password" name="password" required placeholder="••••••••" />
            </div>

            <div class="mb-3">
              <label for="bio" class="form-label">Bio</label>
              <textarea id="bio" class="form-control" [(ngModel)]="bio" name="bio" rows="2" placeholder="Tell us about yourself..."></textarea>
            </div>

            <div class="mb-3">
              <label for="skills" class="form-label">Skills <small class="text-muted">(comma-separated)</small></label>
              <input type="text" id="skills" class="form-control" [(ngModel)]="skillsInput" name="skillsInput" placeholder="e.g. JavaScript, Design, Python" />
            </div>

            <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
              <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
              Register
            </button>
          </form>

          <p class="text-center mt-3 mb-0">
            Already have an account? <a routerLink="/login">Login here</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
