<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-7">
      <h2 class="mb-4">Post a New Job</h2>

      <app-alert *ngIf="errorMessage" [message]="errorMessage" (dismissed)="errorMessage = null"></app-alert>
      <app-alert *ngIf="successMessage" [message]="successMessage" type="success" (dismissed)="successMessage = null"></app-alert>

      <div class="card shadow-sm">
        <div class="card-body p-4">
          <form (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label for="title" class="form-label">Job Title <span class="text-danger">*</span></label>
              <input type="text" id="title" class="form-control" [(ngModel)]="title" name="title" required placeholder="e.g. Build a landing page" />
            </div>

            <div class="mb-3">
              <label for="description" class="form-label">Description <span class="text-danger">*</span></label>
              <textarea id="description" class="form-control" [(ngModel)]="description" name="description" rows="4" required placeholder="Describe the job in detail..."></textarea>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="budget" class="form-label">Budget ($) <span class="text-danger">*</span></label>
                <input type="number" id="budget" class="form-control" [(ngModel)]="budget" name="budget" required min="1" placeholder="100" />
              </div>
              <div class="col-md-6 mb-3">
                <label for="category" class="form-label">Category <span class="text-danger">*</span></label>
                <input type="text" id="category" class="form-control" [(ngModel)]="category" name="category" required placeholder="e.g. Web Development" />
              </div>
            </div>

            <button type="submit" class="btn btn-success w-100" [disabled]="loading">
              <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
              Post Job
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
