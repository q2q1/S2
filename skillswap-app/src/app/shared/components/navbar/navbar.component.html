<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand fw-bold" routerLink="/">SkillSwap</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-center">

        <!-- Links shown when logged in -->
        <ng-container *ngIf="authService.currentUser$ | async as user; else guestLinks">
          <li class="nav-item">
            <a class="nav-link" routerLink="/dashboard">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/jobs">Browse Jobs</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/jobs/create">Post Job</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/my-postings">My Postings</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/my-bids">My Bids</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" [routerLink]="['/profile', user.username]">Profile</a>
          </li>
          <li class="nav-item">
            <button class="btn btn-outline-light btn-sm ms-2" (click)="authService.logout()">Logout</button>
          </li>
        </ng-container>

        <!-- Links shown when logged out -->
        <ng-template #guestLinks>
          <li class="nav-item">
            <a class="nav-link" routerLink="/login">Login</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/register">Register</a>
          </li>
        </ng-template>

      </ul>
    </div>
  </div>
</nav>
